aid: simpletexting
url: https://raw.githubusercontent.com/api-evangelist/simpletexting/refs/heads/main/apis.yml
name: SimpleTexting
kind: company
description: SimpleTexting is a business SMS and MMS marketing platform. Its v2 REST
  API lets developers send single text messages, run bulk campaigns to lists and
  segments, manage contacts and contact lists, upload MMS media, provision sending
  numbers, and subscribe to delivery and incoming-message webhooks, all authenticated
  with a bearer token.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- SMS
- MMS
- Messaging
- Marketing
- Text Messaging
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
