meters:
- name: plan_credits
  description: Monthly credits included in the subscribed plan tier; SMS=1, extended SMS=2, MMS=3 credits.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_credits
  description: Credits consumed beyond the plan allotment, billed at $0.055 per credit.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: user_seats
  description: User seats beyond the three included, billed at $20/month per seat.
  unit: seats
  aggregation: sum
  dimensions:
  - account
- name: sending_numbers
  description: Additional sending phone numbers beyond the included number, billed at $10/month each.
  unit: numbers
  aggregation: sum
  dimensions:
  - account
  - number
principles:
- name: Visibility
  description: Track credit burn via GET /api/tenant balance and the messages endpoint; reconcile against plan allotment monthly.
- name: Allocation
  description: Tag campaigns, lists, and sending numbers per team or initiative to attribute credit spend.
- name: Optimization
  description: Keep messages under 160 characters to stay at 1 credit; avoid unintended MMS (3 credits); right-size the plan tier to minimize $0.055 overage; use annual billing for ~20% savings.
- name: Accountability
  description: Assign owners per sending number and per campaign; review monthly credit usage and overage against budget.
