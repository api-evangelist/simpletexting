description: >-
  FinOps view of SimpleTexting spend. SimpleTexting bills a fixed monthly
  subscription per credit tier, where an SMS up to 160 characters consumes
  one credit, an extended SMS (up to 306 characters) consumes two credits,
  and an MMS consumes three credits. Usage beyond the plan allotment is
  billed as overage at $0.055 per credit. Additional user seats ($20/mo) and
  additional sending numbers ($10/mo) are recurring add-on charges. Annual
  billing reduces effective cost by roughly 20%.
notes: >-
  Per-tier pricing and the credit-to-message ratio are subject to change;
  verify against the SimpleTexting pricing page during reconciliation.
