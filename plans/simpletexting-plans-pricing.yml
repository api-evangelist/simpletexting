description: >-
  SimpleTexting sells monthly credit-based plans where one SMS up to 160
  characters equals one credit, an extended SMS (up to 306 characters) costs
  2 credits, and an MMS costs 3 credits. Plans are tiered by the number of
  included monthly credits, with per-credit cost dropping as volume rises.
  Each plan includes three user seats; additional seats are $20/month and
  additional sending numbers are $10/month. Overage credits beyond the
  monthly allotment are billed at $0.055 per credit. Annual billing saves
  roughly 20% versus monthly. The same API and feature set is available on
  all paid plans; there is a free trial rather than a permanent free tier.
notes: >-
  Representative monthly (month-to-month) US plan tiers and rates as
  published on the SimpleTexting pricing page in 2026; verify current
  tiers, credits, and per-credit pricing on the pricing page, as they change.
sources:
- https://simpletexting.com/pricing/
- https://simpletexting.com/api/
