actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or client-consumed SSE surface exists, so no AsyncAPI
    document was created. The webhook (outbound callback) surface is fully
    represented as REST CRUD operations in openapi/simpletexting-openapi.yml,
    and the Webhooks API is listed in apis.yml.
